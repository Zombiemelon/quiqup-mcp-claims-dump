name: Claude Review

# Auto-review every PR opened or pushed. Distinct from .github/workflows/evals.yml:
# the eval gate runs deterministic scorers against the lastmile order tool; this
# one is general code-quality review across the whole diff.
#
# Required secret: ANTHROPIC_API_KEY (already set on this repo).
#
# Fork PRs are skipped because GitHub blocks secret access from forks by design.

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  # Required by anthropics/claude-code-action@v1 even when using the
  # direct Anthropic API (action uses GitHub OIDC for its internal token
  # exchange; missing this fails with "Could not fetch an OIDC token").
  id-token: write

jobs:
  review:
    name: Claude code review
    runs-on: ubuntu-latest
    # Skip PRs from forks — they can't access ANTHROPIC_API_KEY anyway.
    if: github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR. Focus narrowly on:
              - Correctness bugs / edge cases in changed code
              - Security (Clerk auth, Quiqup tokens, real-API side effects)
              - Tool description quality if lib/tools/ changed

            Post a short top-level summary plus inline comments only on
            issues that would actually break or surprise. Skip nits.
            CLAUDE.md / AGENTS.md and docs/quiqup-api/ have the project
            conventions and Quiqup API canonical reference.
          claude_args: |
            --max-turns 30
            --model claude-sonnet-4-6
