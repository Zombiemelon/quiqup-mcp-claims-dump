name: Eval Gate

# Phase-1 onwards "Langfuse eval per service-host family" gate. Runs the
# offline-tool-call evals plus the description-quality + surface-snapshot
# scorers with EVAL_GATE=1 set, so a regression fails the build.
#
# Distinct from .github/workflows/evals.yml — that file is the original
# lastmile-order-creation eval (v1-offline + v3-roundtrip with staging side
# effects). This file is the per-family gate that grew out of Phase 1's
# "every service-host family ships with at least one Langfuse eval"
# invariant; it currently covers:
#
#   - tool-surface       — snapshot diff of the registered tool set vs
#                          evals/snapshots/tool-surface.json. Cheap; runs
#                          on every PR.
#   - get-account        — Phase-1 Platform-read family (added 2026-05-19).
#   - lookup-google-place — Google Places family (added 2026-05-19; first
#                          eval for this brand-new service host).
#   - integrations-shared, shopify-integration, woocommerce-integration,
#     salla-integration, destructive-integrations — Phase-2 family coverage
#     (added 2026-05-19, plan 02-06). Salla and destructive evals include
#     STATIC source-inspection scorers that lock T-02-29 (token omission),
#     T-02-30 (404-as-null), and T-02-52 (confirm-gate identity) at the CI
#     layer.
#   - orders-graphql, orders-history-and-audit, orders-export,
#     orders-document-upload — Phase-3 family coverage (added 2026-05-20,
#     plan 03-05). orders-history-and-audit includes the audit-no-bearer
#     + audit-exception-header-present STATIC scorers that lock the
#     second-ever auth-exception client (lib/clients/audit.ts).
#     orders-export includes the binary-envelope-contract +
#     csv-date-format-pin STATIC scorers — the binary envelope shape
#     ({ contentType, base64, filenameHint }) will be reused by Phase 5
#     (PDF labels), Phase 7 (inventory CSV), and Phase 10 (Zoho PDFs).
#     orders-document-upload includes the no-caller-identity-fields +
#     guardrails-block-present STATIC scorers that lock BL-04
#     server-binding + BL-01 canonical guardrails.
#   - batch-transitions, single-order-mutations, order-creation,
#     missions — Phase-4 family coverage (added 2026-05-21, plan 04-05).
#     batch-transitions includes destructive-gate-present + factory-
#     uniformity + reason-field-pin + dry-run-richness STATIC scorers
#     that lock T-04-26/27/28/29 + D-01/D-02/D-03 — the canonical
#     batch-transition contract (11 factory ORDT + unpool_order +
#     update_fulfilment_order_status + transfer_mission_orders share
#     confirm+dry_run via lib/middleware/destructive.ts; the 4 reason-
#     bearing tools use free-form z.string() and name their list_*_
#     reasons companion; the factory still synthesizes the rich preview).
#     single-order-mutations includes destructive-gate-present-ords-04
#     (D-06 split — ONLY update_fulfilment_order_status is gated) and
#     numeric-bounds-pin (T-04-13/14 — 100_000 amount cap + .max(1000)
#     weight cap). order-creation includes bl-04-server-binding (T-04-30)
#     and bulk-csv-cap-pin (T-04-31 — 13_500_000 / ~10MB). missions
#     includes the critical gating-asymmetry-lock STATIC scorer that
#     locks D-05 (create_mission has NO confirm; transfer_mission_orders
#     wires the canonical destructive confirm+dry_run).
#
# Required GitHub Actions secrets:
#   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_BASE_URL
#   ANTHROPIC_API_KEY
#
# Manual runs: trigger from the Actions tab via workflow_dispatch.

on:
  pull_request:
    paths:
      - "lib/tools/**"
      - "lib/clients/**"
      - "lib/middleware/**"
      - "app/[transport]/**"
      - "evals/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/eval-gate.yml"
  workflow_dispatch:

# Cancel earlier in-progress runs on the same PR/branch so the latest
# commit's eval is the authoritative one.
concurrency:
  group: eval-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tool-surface:
    name: Eval gate — tool-surface snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: "Eval gate — eval:tool-surface (registered-tools snapshot)"
        env:
          EVAL_GATE: "1"
        run: bun run eval:tool-surface

  get-account:
    name: Eval gate — get_account (Phase-1 Platform reads)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: "Eval gate — eval:get-account (args-overlap >= 0.8, description-quality >= 1.0)"
        env:
          EVAL_GATE: "1"
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: https://us.cloud.langfuse.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run eval:get-account

